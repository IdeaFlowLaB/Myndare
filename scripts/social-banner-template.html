<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>LicenseKing Social Banner Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #2dd4bf;
      --teal-dim: rgba(45, 212, 191, 0.15);
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.18);
      --deep-blue: #0f172a;
      --deep-blue-mid: #1e293b;
      --mint: #6ee7b7;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--deep-blue);
      font-family: 'Noto Sans TC', 'Outfit', sans-serif;
      color: var(--text-primary);
    }
    .stage {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 80px;
      gap: 70px;
    }
    /* Ambient orbs（跟產品頁同款，比例縮放） */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 { width: 460px; height: 460px; background: var(--teal-dim); top: -120px; right: -100px; }
    .orb-2 { width: 380px; height: 380px; background: var(--purple-dim); bottom: -120px; left: -80px; }
    .orb-3 { width: 280px; height: 280px; background: rgba(110, 231, 183, 0.10); top: 200px; left: 480px; }
    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(45, 212, 191, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 212, 191, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* Left: icon */
    .icon-wrap {
      position: relative;
      flex: 0 0 340px;
      width: 340px;
      height: 340px;
      border-radius: 22%;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(45, 212, 191, 0.35), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .icon-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Right: copy */
    .copy {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 2;
    }
    .label {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .label::before {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: var(--teal);
    }
    h1 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 66px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.01em;
    }
    h1 .accent {
      background: linear-gradient(135deg, var(--teal), var(--mint));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 26px;
      color: var(--text-secondary);
      font-weight: 400;
      line-height: 1.4;
    }
    .code-box {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
      align-self: flex-start;
    }
    .code-label {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--teal);
      background: rgba(45,212,191,0.10);
      border: 1.5px dashed rgba(45,212,191,0.45);
      border-radius: 12px;
      padding: 12px 22px;
    }
    .footer {
      position: absolute;
      left: 80px;
      bottom: 38px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      z-index: 2;
    }
    .footer strong {
      color: var(--teal);
      font-weight: 600;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>

    <div class="icon-wrap">
      <img src="/licenseking/app-icon.png" alt="License King app icon">
    </div>

    <div class="copy">
      <div class="label">License King</div>
      <h1>你的證照，<br><span class="accent">一個 App 搞定</span></h1>
      <p class="subtitle">已上架 App Store，30 天免費試用 Pro</p>
      <div class="code-box">
        <span class="code-label">優惠碼</span>
        <span class="code">LICENSEKING30</span>
      </div>
    </div>

    <div class="footer"><strong>MYNDARE</strong> · myndare.com/licenseking</div>
  </div>
</body>
</html>
